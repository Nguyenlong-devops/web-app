name: CI/CD Deploy to Docker Server

on:
  push:
    branches: [ "main" ]

# Sửa Warning về Node.js 20 bằng cách ép workflow dùng Node 24 trước thời hạn
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Cập nhật actions/checkout lên bản v4 chuẩn
    - name: Checkout code
      uses: actions/checkout@v4

    # Dùng SSH thẳng vào máy Linux để chạy docker compose up --build
    - name: SSH into Linux Server & Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          # Di chuyển vào đúng thư mục dự án trên máy Linux
          cd ~/it-dashboard
          
          # Đồng bộ code mới nhất từ GitHub về máy Linux
          git pull origin main
          
          # Khởi chạy và tự Build Docker Compose cục bộ ngay trên Server của bạn
          docker compose up --build -d
          
          # Dọn dẹp các bản build cũ/rác để tiết kiệm tài nguyên
          docker image prune -f
