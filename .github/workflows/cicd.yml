name: CI/CD Deploy to Docker Server

on:
  push:
    branches: [ "main" ]

# Bạn có thể giữ hoặc bỏ biến này đi sau khi đã nâng cấp phiên bản Action bên dưới
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Nâng cấp từ @v4 lên @v4.2.2 (hoặc phiên bản mới nhất hỗ trợ Node 24)
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    # 2. Nâng cấp appleboy/ssh-action lên bản mới nhất tương thích hoàn toàn
    - name: SSH into Linux Server & Deploy
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd ~/it-dashboard
          git pull origin main
          docker compose up --build -d
          docker image prune -f